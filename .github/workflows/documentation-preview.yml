name: Docs Preview

# Builds and deploys docs for any branch except main.
# Published to: caterer-z-t.github.io/GRiD/dev/
# The main docs (root of gh-pages) are left untouched via keep_files: true.

on:
  push:
    branches-ignore: [main]

permissions:
  contents: write

jobs:
  build-and-deploy-preview:
    name: Build and deploy preview documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (required by pysam/HTSlib)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libhts-dev zlib1g-dev libbz2-dev liblzma-dev

      - name: Install package and doc dependencies
        run: |
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build docs
        run: make -C docs html

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          publish_branch: gh-pages
          destination_dir: dev
          keep_files: true
