name: grid
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python>=3.8
  - pip

  # Core dependencies
  - click>=8.0
  - pyyaml>=6.0
  - pysam>=0.21.0
  - pandas>=1.5.0
  - numpy>=1.23.0
  - mosdepth=0.3.12
  - jinja2>=3.0
  - rich>=13.0
  - validators>=0.20.0

  # Packages easier via pip
  - pip:
      - dataclasses-json>=0.5.7

